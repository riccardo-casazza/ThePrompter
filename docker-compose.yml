services:
  web:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - tmp_data:/app/tmp
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      RAILS_ENV: development

  sidekiq:
    build: .
    command: bundle exec sidekiq
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - tmp_data:/app/tmp
    env_file:
      - .env
    environment:
      RAILS_ENV: development

volumes:
  bundle_cache:
  tmp_data:
